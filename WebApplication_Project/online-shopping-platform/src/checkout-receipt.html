<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單收據</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="site-header" class="no-print"></div>

    <main class="receipt_container">
        <div class="receipt_actions no-print">
            <button class="receipt_btn_print" onclick="window.print()">
                <i class="fas fa-print"></i> 列印收據
            </button>
            <button class="receipt_btn_home" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i> 返回首頁
            </button>
        </div>

        <div class="receipt_paper">
            <!-- top of receipt -->
            <div class="receipt_header">
                <div class="receipt_logo">
                    <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'">
                    <h1>電子產品專賣店</h1>
                </div>
                <div class="receipt_status">
                    <i class="fas fa-check-circle"></i>
                    <span>付款成功</span>
                </div>
            </div>

            <!-- order information -->
            <div class="receipt_order_info">
                <div class="receipt_info_row">
                    <span class="receipt_label">收據編號：</span>
                    <span class="receipt_value" id="receipt_number">-</span>
                </div>
                <div class="receipt_info_row">
                    <span class="receipt_label">訂單日期：</span>
                    <span class="receipt_value" id="receipt_date">-</span>
                </div>
                <div class="receipt_info_row">
                    <span class="receipt_label">付款方式：</span>
                    <span class="receipt_value" id="receipt_payment">-</span>
                </div>
            </div>

            <!-- customer information -->
            <div class="receipt_section">
                <h2 class="receipt_section_title">
                    <i class="fas fa-user"></i> 客戶資訊
                </h2>
                <div class="receipt_customer_info" id="receipt_customer">
                    <!-- Dynamically generated by JavaScript -->
                </div>
            </div>

            <!-- delivery information -->
            <div class="receipt_section">
                <h2 class="receipt_section_title">
                    <i class="fas fa-shipping-fast"></i> 配送資訊
                </h2>
                <div class="receipt_delivery_info" id="receipt_delivery">
                    <!-- Dynamically generated by JavaScript -->
                </div>
            </div>

            <!-- order details -->
            <div class="receipt_section">
                <h2 class="receipt_section_title">
                    <i class="fas fa-shopping-bag"></i> 訂單明細
                </h2>
                <table class="receipt_table">
                    <thead>
                        <tr>
                            <th>產品名稱</th>
                            <th>規格</th>
                            <th>單價</th>
                            <th>數量</th>
                            <th>小計</th>
                        </tr>
                    </thead>
                    <tbody id="receipt_items">
                        <!-- Dynamically generated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- totals -->
            <div class="receipt_totals">
                <div class="receipt_total_row">
                    <span>商品小計</span>
                    <span id="receipt_subtotal">HK$ 0.00</span>
                </div>
                <div class="receipt_total_row">
                    <span>運費</span>
                    <span>免費</span>
                </div>
                <div class="receipt_total_row receipt_grand_total">
                    <span>總計金額</span>
                    <span id="receipt_total">HK$ 0.00</span>
                </div>
            </div>

            <!-- bottom of receipt -->
            <div class="receipt_footer">
                <p class="receipt_thanks">感謝您的購買！</p>
                <p class="receipt_note">
                    此收據為電子收據，如有任何問題請聯絡客戶服務。<br>
                    客服熱線：(852) 1234-5678 | 電郵：support@example.com
                </p>
                <div class="receipt_qr">
                    <p>掃描查詢訂單狀態</p>
                    <div class="receipt_qr_placeholder">
                        <img src="assets/CheckQRCode.webp" alt="CheckQRCode" height="150px" width="150px">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer" class="no-print"></div>

    <script src="js/app.js"></script>
    <script src="js/checkout-receipt.js"></script>
</body>
</html>
