<script>
// product YouTube video mapping
const productVideos = {
    'APPLE iPhone 17 Pro': 'h6CwwHyQxKI',
    'APPLE iPhone 17 Pro Max': 'h6CwwHyQxKI',
    'APPLE iPhone Air': 'M0au92yebLQ',
    'APPLE Airpods Pro 3': 'h6CwwHyQxKI',
    'APPLE Watch Ultra 3 GPS + Cellular': 'h6CwwHyQxKI',
    'APPLE MacBook Pro 16吋 M3 Pro': 'h6CwwHyQxKI'
};

// Initialize the latest product components
function initLatestProductComponent() {
    console.log('📦 Initializing latest_product component');
    
    // Check if the necessary elements exist.
    const modal = document.getElementById('productModal');
    const closeBtn = document.querySelector('.modal-close');
    
    if (!modal) {
        console.error('❌ Cannot find productModal element');
        return false;
    }
    
    if (!closeBtn) {
        console.error('❌ Cannot find modal-close element');
        return false;
    }
    
    // Add click event to product images
    const productImages = document.querySelectorAll('.product-image');
    console.log(`🖼️ Found ${productImages.length} product images`);
    
    if (productImages.length === 0) {
        console.warn('⚠️ No product images found, retrying later...');
        return false;
    }
    
    productImages.forEach((image, index) => {
        // Check if the event is already bound (to avoid duplicate binding)
        if (image.hasAttribute('data-event-bound')) {
            return;
        }
        
        console.log(`🖼️ Binding event to image #${index + 1}:`, image.alt);
        
        // Add visual hint
        image.style.cursor = 'pointer';
        image.title = 'Click to view details';
        
        image.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('🖱️ Clicked product image:', this.alt);
            openProductModal(this);
        });
        
        // Add keyboard support
        image.setAttribute('tabindex', '0');
        image.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                console.log('⌨️ Keyboard triggered product details:', this.alt);
                openProductModal(this);
            }
        });
        
        // Mark event as bound
        image.setAttribute('data-event-bound', 'true');
    });
    
    // Modal close event (check if already bound)
    if (!closeBtn.hasAttribute('data-event-bound')) {
        closeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('❌ Clicked close button');
            closeProductModal();
        });
        closeBtn.setAttribute('data-event-bound', 'true');
    }
    
    // Click outside modal to close (check if already bound)
    if (!modal.hasAttribute('data-event-bound')) {
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                console.log('❌ Clicked outside modal to close');
                closeProductModal();
            }
        });
        modal.setAttribute('data-event-bound', 'true');
    }
    
    console.log('✅ latest_product component initialized');
    return true;
}

// Multiple initialization strategy
function setupLatestProductComponent() {
    // Try initializing immediately
    if (initLatestProductComponent()) {
        return;
    }
    
    // If immediate initialization fails, wait for DOM to fully load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (!initLatestProductComponent()) {
                    // If still fails, wait a bit more
                    setTimeout(initLatestProductComponent, 500);
                }
            }, 100);
        });
    } else {
        // DOM already loaded, but component might be dynamically loaded
        setTimeout(() => {
            if (!initLatestProductComponent()) {
                // Last attempt
                setTimeout(initLatestProductComponent, 1000);
            }
        }, 100);
    }
}

// ESC key closes modal (global event, only bound once)
if (!window.latestProductEscBound) {
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('productModal');
            if (modal && modal.style.display === 'block') {
                console.log('❌ ESC key closes modal');
                closeProductModal();
            }
        }
    });
    window.latestProductEscBound = true;
}

function openProductModal(imageElement) {
    console.log('🔓 Open product modal');
    
    try {
        const productCard = imageElement.closest('.product-card');
        if (!productCard) {
            console.error('❌ Product card not found');
            return;
        }
        
        const productName = productCard.querySelector('h3')?.textContent;
        const productPrice = productCard.querySelector('.price')?.textContent;
        const productImage = imageElement.src;
        const productSpecs = productCard.querySelector('.product-specs');
        const colorOptions = productCard.querySelectorAll('.color-dot');
        
        console.log('📋 Product info:', { productName, productPrice, productImage });
        
        // Check necessary modal elements
        const modalElements = {
            image: document.getElementById('modalProductImage'),
            name: document.getElementById('modalProductName'),
            price: document.getElementById('modalProductPrice'),
            colorOptions: document.getElementById('modalColorOptions'),
            specs: document.getElementById('modalProductSpecs'),
            video: document.getElementById('modalYouTubeVideo'),
            modal: document.getElementById('productModal')
        };
        
        // Check if all elements exist
        for (const [key, element] of Object.entries(modalElements)) {
            if (!element) {
                console.error(`❌ Modal element not found: ${key}`);
                return;
            }
        }
        
        // Fill modal content
        modalElements.image.src = productImage;
        modalElements.image.alt = productName;
        modalElements.name.textContent = productName;
        modalElements.price.textContent = productPrice;
        
        // Handle color options
        if (colorOptions.length > 0) {
            modalElements.colorOptions.innerHTML = '<h4>Available Colors:</h4>';
            colorOptions.forEach(colorDot => {
                const newColorDot = colorDot.cloneNode(true);
                newColorDot.addEventListener('click', function() {
                    console.log('🎨 Switch color:', this.dataset.image);
                    modalElements.image.src = this.dataset.image;
                });
                modalElements.colorOptions.appendChild(newColorDot);
            });
        } else {
            modalElements.colorOptions.innerHTML = '';
        }
        
        // Handle product specifications
        if (productSpecs) {
            const specLabels = {
                'cpu': '處理器',
                'ram': '記憶體',
                'storage': '儲存空間',
                'screen': '螢幕',
                'camera': '相機',
                'battery': '電池',
                'os': '作業系統',
                'sim': 'SIM卡'
            };
            
            let specsHTML = '<h4>產品規格：</h4>';
            Object.keys(specLabels).forEach(key => {
                const value = productSpecs.getAttribute(`data-${key}`);
                if (value && value !== '不適用' && value !== '無') {
                    specsHTML += `
                        <div class="spec-item">
                            <span class="spec-label">${specLabels[key]}：</span>
                            <span class="spec-value">${value}</span>
                        </div>
                    `;
                }
            });
            modalElements.specs.innerHTML = specsHTML;
        } else {
            modalElements.specs.innerHTML = '<p>暫無詳細規格信息</p>';
        }
        
        // Set YouTube video
        const videoId = productVideos[productName] || 'h6CwwHyQxKI';
        const youtubeEmbed = `https://www.youtube.com/embed/${videoId}?si=ZSrowG1T5BTEaztu&rel=0`;
        modalElements.video.src = youtubeEmbed;
        
        // Show modal
        modalElements.modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        console.log('✅ Modal shown successfully');
        
        // Focus on the modal for keyboard navigation
        setTimeout(() => {
            modalElements.modal.focus();
        }, 100);
        
    } catch (error) {
        console.error('❌ Error opening modal:', error);
    }
}

function closeProductModal() {
    console.log('🔒 Closing product modal');
    
    try {
        const modal = document.getElementById('productModal');
        const iframe = document.getElementById('modalYouTubeVideo');
        
        if (modal) {
            modal.style.display = 'none';
        }
        
        document.body.style.overflow = 'auto';
        
        // Stop YouTube video playback
        if (iframe) {
            iframe.src = iframe.src;
        }
        
        console.log('✅ Modal closed successfully');
        
    } catch (error) {
        console.error('❌ Error closing modal:', error);
    }
}
