<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping Platform</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth-modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <header class="main-header">
        <div class="header-top">
            <div class="logo-area">
                <a href="index.html"><img src="assets/logo.png" alt="YOHO Logo" class="logo-img"></a>
            </div>
            <div class="search-area">
                <div class="search-wrapper">
                    <input type="text" id="search-input" class="search-input" placeholder="搜尋你喜愛的產品" autocomplete="off">
                    <button class="search-btn" id="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="hot-search">
                    熱門搜尋：
                    <a href="brandproductlist.html?brand=Apple">蘋果</a>
                    <a href="product.html">真無線藍牙耳機</a>
                    <a href="#">潤海梳</a>
                    <a href="#">冷氣機</a>
                    <a href="#">面膜機</a>
                    <a href="#">HIFU機</a>
                    <a href="#">電視機</a>
                    <a href="#">清洗冷氣機</a>
                </div>
            </div>
            <div class="header-icons">
                <!-- shopping cart -->
                <div class="cart-wrapper">
                    <a href="#" id="cart-icon" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                    </a>
                    <div id="cart-dropdown" class="cart-dropdown">
                        <div class="cart-header">
                            <h3>購物車</h3>
                            <span class="cart-count-text">0 件商品</span>
                        </div>
                        <div class="cart-items">
                            <div style="text-align:center;padding:40px;color:#999;">購物車是空的</div>
                        </div>
                        <div class="cart-footer">
                            <div class="cart-total">
                                總計: <span id="cart-total-amount">HK$ 0.00</span>
                            </div>
                            <button class="cart-checkout">結帳</button>
                        </div>
                    </div>
                </div>
                <!-- login/register -->
                <a href="#" class="login-icon" title="登入註冊">👤 登入註冊</a>
            </div>
        </div>

        <!-- side category sidebar -->
        <div id="category-sidebar" class="sidebar">
            <div class="sidebar-content">
                <!-- main category -->
                <div id="category-level-1" class="category-level active">
                    <ul>
                        <li data-category="digital">數碼娛樂</li>
                        <li data-category="mobile">手機通訊</li>
                        <li data-category="computer">電腦</li>
                    </ul>
                </div>
                <!-- subcategory -->
                <div id="category-level-2" class="category-level">
                    <button id="back-btn">&lt; 返回</button>
                    <h3 id="category-title"></h3>
                    <ul id="subcategory-list"></ul>
                </div>
                <!-- detailed category content (can be dynamically generated by JS, static reference here) -->

                <div id="category-level-3" class="category-level">
                    <button id="back-btn-2" class="category-back-btn">&lt; 返回</button>
                    <h3 id="group-title" class="category-subtitle"></h3>
                    <ul id="detail-list"></ul>
                </div>
            </div>
        </div>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <nav class="main-nav">
            <a href="#" id="category-btn"><span class="menu-icon">☰</span> 產品分類</a>
            <a href="#">限時搶購</a>
            <a href="#">最新產品</a>
            <a href="#">熱門品牌</a>
            <a href="#">信用卡優惠</a>
        </nav>


    </header>

    <script src="../js/auth-modal.js"></script>
    <script src="../js/search.js"></script>
</body>
</html>
