<div class="cart">
    <h2>Your Shopping Cart</h2>
    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-items">
            <!-- Cart items will be dynamically inserted here -->
        </tbody>
    </table>
    <div class="cart-summary">
        <h3>Cart Summary</h3>
        <p id="total-price">Total Price: $0.00</p>
        <button id="checkout-button">Proceed to Checkout</button>
    </div>
</div>
