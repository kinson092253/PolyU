<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>確認訂單詳情</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="css/auth-modal.css">
    <link rel="stylesheet" href="css/compare-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="cd_container">
        <div class="cd_steps">
            <div class="cd_step cd_active">
                <div class="cd_step_number">1</div>
                <div class="cd_step_text">確認產品詳情</div>
            </div>
            <div class="cd_step_line"></div>
            <div class="cd_step">
                <div class="cd_step_number">2</div>
                <div class="cd_step_text">付款</div>
            </div>
            <div class="cd_step_line"></div>
            <div class="cd_step">
                <div class="cd_step_number">3</div>
                <div class="cd_step_text">完成</div>
            </div>
        </div>

        <h1 class="cd_title">確認訂單詳情</h1>
        
        <div class="cd_products" id="cd_products">
            <!-- The product list will be dynamically generated by JavaScript. -->
        </div>

        <div class="cd_summary">
            <div class="cd_summary_row">
                <span>小計：</span>
                <span id="cd_subtotal">HK$ 0.00</span>
            </div>
            <div class="cd_summary_row">
                <span>運費：</span>
                <span>免費</span>
            </div>
            <div class="cd_summary_row cd_total">
                <span>總計：</span>
                <span id="cd_total">HK$ 0.00</span>
            </div>
        </div>

        <div class="cd_actions">
            <button class="cd_btn_secondary" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> 返回購物車
            </button>
            <button class="cd_btn_primary" id="cd_proceed_payment">
                前往付款 <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="js/app.js"></script>
    <script src="js/checkout-details.js"></script>
    <script src="js/auth-modal.js"></script>
    <script src="js/product-compare.js"></script>
</body>
</html>
